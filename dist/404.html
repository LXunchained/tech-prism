<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TechPrism</title>
  <script>
    // GitHub Pages SPA routing: redirect 404s back to the app with the path encoded
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/' + l.pathname.slice(1).split('/').slice(0, 1).join('/') +
      '?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
