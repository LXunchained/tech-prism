<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TechPrism</title>
  <script>
    // GitHub Pages SPA redirect: encode path into query string for index.html to decode
    (function() {
      var l = window.location;
      // Skip redirect for static files
      if (/\.(html|js|css|png|jpg|jpeg|gif|svg|ico|json|xml|txt|webp|woff2?)$/i.test(l.pathname)) return;
      var path = l.pathname;
      var search = l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '';
      var hash = l.hash;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + path.replace(/&/g, '~and~') +
        search + hash
      );
    })();
  </script>
</head>
<body></body>
</html>
