<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>TechPrism</title>
<script>
    // GitHub Pages SPA routing: redirect 404s back to the app with the path encoded
    // BUT skip static files — let them 404 naturally (avoids redirect loops)
    var l = window.location;
    var staticExts = /\.(xml|txt|json|ico|png|jpg|jpeg|css|js|map|svg|woff2?)$/i;
    if (!staticExts.test(l.pathname)) {
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/' + l.pathname.slice(1).split('/').slice(0, 1).join('/') +
        '?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }
  </script>
</head>
</html>
