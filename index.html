    <!-- GitHub Pages SPA routing fix -->
    <script>
      (function(l) {
        // Decode the path from ?p=/path&q=querystring format sent by 404.html
        var params = new URLSearchParams(l.search);
        var p = params.get('p');
        if (p) {
          var q = params.get('q');
          var decoded = p + (q ? '?' + q.replace(/~and~/g, '&') : '') + l.hash;
          window.history.replaceState(null, null, decoded);
        }
      }(window.location))
    </script>
